name: APK Derle
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Al
        uses: actions/checkout@v4
      - name: Java Kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Android SDK Kur
        run: |
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q cmdtools.zip -d $HOME/android/cmdline-tools
          mv $HOME/android/cmdline-tools/cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/android "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null
      - name: Gradle Wrapper Oluştur
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle-dist
          export PATH="$HOME/gradle-dist/gradle-8.7/bin:$PATH"
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: APK Derle
        run: |
          export ANDROID_HOME=$HOME/android
          export ANDROID_SDK_ROOT=$HOME/android
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: APK Yükle
        uses: actions/upload-artifact@v4
        with:
          name: AydogduCari-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
